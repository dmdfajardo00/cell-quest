<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <title>Option 7: Atom-Cell Hybrid</title>
  <defs>
    <radialGradient id="o7-core" cx="42%" cy="38%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </radialGradient>
    <filter id="o7-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="108" fill="#1A1A2E"/>
  <!-- Orbit 1 (horizontal ellipse) -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.35"/>
  <!-- Orbit 2 (tilted 60deg) -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.35" transform="rotate(60 256 256)"/>
  <!-- Orbit 3 (tilted -60deg) -->
  <ellipse cx="256" cy="256" rx="200" ry="80" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.35" transform="rotate(-60 256 256)"/>
  <!-- Central nucleus/cell core -->
  <circle cx="256" cy="256" r="65" fill="url(#o7-core)" filter="url(#o7-glow)"/>
  <!-- Core highlight -->
  <ellipse cx="240" cy="238" rx="22" ry="16" fill="#E0D4FF" opacity="0.25"/>
  <!-- Inner detail: mini organelles in core -->
  <ellipse cx="240" cy="260" rx="8" ry="4" fill="#FF6B6B" opacity="0.5" transform="rotate(-15 240 260)"/>
  <circle cx="270" cy="250" r="5" fill="#4EA8DE" opacity="0.4"/>
  <circle cx="255" cy="275" r="3" fill="#FFB938" opacity="0.5"/>
  <!-- Orbit 1 organelle (coral - mitochondria) -->
  <circle cx="456" cy="256" r="16" fill="#FF6B6B" opacity="0.9"/>
  <circle cx="456" cy="256" r="10" fill="#FF8A8A" opacity="0.5"/>
  <!-- Orbit 1 opposite -->
  <circle cx="56" cy="256" r="12" fill="#FF6B6B" opacity="0.6"/>
  <!-- Orbit 2 organelle (green - chloroplast) -->
  <circle cx="356" cy="429" r="16" fill="#4ADE80" opacity="0.9"/>
  <circle cx="356" cy="429" r="10" fill="#6FE8A0" opacity="0.5"/>
  <!-- Orbit 2 opposite -->
  <circle cx="156" cy="83" r="12" fill="#4ADE80" opacity="0.6"/>
  <!-- Orbit 3 organelle (gold - ribosome) -->
  <circle cx="356" cy="83" r="16" fill="#FFB938" opacity="0.9"/>
  <circle cx="356" cy="83" r="10" fill="#FFD060" opacity="0.5"/>
  <!-- Orbit 3 opposite -->
  <circle cx="156" cy="429" r="12" fill="#FFB938" opacity="0.6"/>
  <!-- Secondary orbit dots (smaller, trail effect) -->
  <circle cx="420" cy="220" r="4" fill="#A78BFA" opacity="0.3"/>
  <circle cx="380" cy="195" r="3" fill="#A78BFA" opacity="0.2"/>
  <circle cx="92" cy="292" r="4" fill="#A78BFA" opacity="0.3"/>
  <circle cx="300" cy="410" r="4" fill="#A78BFA" opacity="0.3"/>
  <circle cx="212" cy="102" r="4" fill="#A78BFA" opacity="0.3"/>
  <circle cx="300" cy="102" r="4" fill="#A78BFA" opacity="0.3"/>
  <circle cx="212" cy="410" r="4" fill="#A78BFA" opacity="0.3"/>
  <!-- Energy sparks -->
  <circle cx="256" cy="185" r="3" fill="#FFF" opacity="0.15"/>
  <circle cx="316" cy="256" r="2.5" fill="#FFF" opacity="0.12"/>
  <circle cx="215" cy="310" r="2.5" fill="#FFF" opacity="0.1"/>
</svg>
