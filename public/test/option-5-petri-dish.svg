<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <title>Option 5: Petri Dish Cell</title>
  <defs>
    <radialGradient id="o5-dish" cx="50%" cy="48%">
      <stop offset="0%" stop-color="#2A2A48" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o5-cell" cx="42%" cy="38%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.35"/>
    </radialGradient>
    <radialGradient id="o5-nucleus" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="#1A1A2E"/>
  <!-- Petri dish rim (3D effect) -->
  <ellipse cx="256" cy="268" rx="195" ry="190" fill="none" stroke="#6D28D9" stroke-width="8" opacity="0.3"/>
  <ellipse cx="256" cy="260" rx="195" ry="190" fill="none" stroke="#8B5CF6" stroke-width="4"/>
  <ellipse cx="256" cy="260" rx="188" ry="183" fill="none" stroke="#A78BFA" stroke-width="1.5" opacity="0.4"/>
  <!-- Dish interior shadow -->
  <ellipse cx="256" cy="260" rx="180" ry="175" fill="url(#o5-dish)"/>
  <!-- Cell body (translucent, like under microscope) -->
  <path d="M256 120 C340 120, 400 180, 395 260 C390 340, 330 390, 256 395 C182 390, 125 340, 120 260 C115 180, 172 120, 256 120Z" fill="url(#o5-cell)"/>
  <!-- Cell membrane -->
  <path d="M256 120 C340 120, 400 180, 395 260 C390 340, 330 390, 256 395 C182 390, 125 340, 120 260 C115 180, 172 120, 256 120Z" fill="none" stroke="#A78BFA" stroke-width="2.5" opacity="0.6"/>
  <!-- Nucleus with N -->
  <ellipse cx="260" cy="255" rx="55" ry="50" fill="url(#o5-nucleus)" opacity="0.8"/>
  <ellipse cx="250" cy="242" rx="20" ry="15" fill="#E0D4FF" opacity="0.3"/>
  <text x="260" y="272" text-anchor="middle" font-family="'Fredoka', sans-serif" font-weight="700" font-size="42" fill="#F0F0F8" opacity="0.9">N</text>
  <!-- Organelles -->
  <ellipse cx="175" cy="210" rx="20" ry="9" fill="#FF6B6B" opacity="0.65" transform="rotate(-25 175 210)"/>
  <ellipse cx="345" cy="310" rx="18" ry="8" fill="#FF6B6B" opacity="0.55" transform="rotate(30 345 310)"/>
  <ellipse cx="335" cy="190" rx="16" ry="10" fill="#4ADE80" opacity="0.6" transform="rotate(12 335 190)"/>
  <ellipse cx="170" cy="320" rx="15" ry="9" fill="#4ADE80" opacity="0.5" transform="rotate(-8 170 320)"/>
  <circle cx="205" cy="340" r="18" fill="#4EA8DE" opacity="0.35"/>
  <!-- Ribosomes -->
  <circle cx="290" cy="175" r="5" fill="#FFB938" opacity="0.7"/>
  <circle cx="200" cy="260" r="4" fill="#FFB938" opacity="0.6"/>
  <circle cx="310" cy="270" r="4.5" fill="#FFB938" opacity="0.65"/>
  <circle cx="230" cy="170" r="3.5" fill="#FFB938" opacity="0.55"/>
  <!-- ER -->
  <path d="M195 290 Q215 275, 235 290 Q255 305, 275 290 Q295 275, 315 290" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.3"/>
  <!-- Glass reflection -->
  <ellipse cx="190" cy="160" rx="60" ry="25" fill="#FFF" opacity="0.04" transform="rotate(-20 190 160)"/>
</svg>
