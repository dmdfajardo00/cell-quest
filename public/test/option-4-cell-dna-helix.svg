<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img">
  <title>Option 4: Cell + DNA Helix</title>
  <defs>
    <radialGradient id="o4-cell" cx="45%" cy="40%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="60%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </radialGradient>
    <radialGradient id="o4-nucleus" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#E0D4FF"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="#1A1A2E"/>
  <!-- Cell sphere -->
  <circle cx="280" cy="256" r="120" fill="url(#o4-cell)" opacity="0.85"/>
  <!-- Cell highlight -->
  <ellipse cx="250" cy="210" rx="50" ry="35" fill="#C4B5FD" opacity="0.15"/>
  <!-- Nucleus -->
  <ellipse cx="285" cy="250" rx="42" ry="38" fill="url(#o4-nucleus)"/>
  <ellipse cx="275" cy="240" rx="16" ry="12" fill="#E0D4FF" opacity="0.35"/>
  <!-- Organelles inside cell -->
  <ellipse cx="230" cy="220" rx="14" ry="7" fill="#FF6B6B" opacity="0.7" transform="rotate(-15 230 220)"/>
  <ellipse cx="340" cy="300" rx="12" ry="6" fill="#4ADE80" opacity="0.7" transform="rotate(20 340 300)"/>
  <circle cx="240" cy="310" r="12" fill="#4EA8DE" opacity="0.45"/>
  <circle cx="320" cy="200" r="4" fill="#FFB938" opacity="0.85"/>
  <circle cx="260" cy="280" r="3.5" fill="#FFB938" opacity="0.75"/>
  <!-- DNA Helix (left side, wrapping) -->
  <!-- Strand 1 -->
  <path d="M140 80 C180 120, 100 160, 140 200 C180 240, 100 280, 140 320 C180 360, 100 400, 140 440" fill="none" stroke="#A78BFA" stroke-width="4" stroke-linecap="round"/>
  <!-- Strand 2 -->
  <path d="M180 80 C140 120, 220 160, 180 200 C140 240, 220 280, 180 320 C140 360, 220 400, 180 440" fill="none" stroke="#C4B5FD" stroke-width="4" stroke-linecap="round"/>
  <!-- Rungs -->
  <line x1="148" y1="120" x2="172" y2="120" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="122" y1="160" x2="198" y2="160" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="148" y1="200" x2="172" y2="200" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="122" y1="240" x2="198" y2="240" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="148" y1="280" x2="172" y2="280" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="122" y1="320" x2="198" y2="320" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="148" y1="360" x2="172" y2="360" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <line x1="122" y1="400" x2="198" y2="400" stroke="#FFB938" stroke-width="2.5" opacity="0.6"/>
  <!-- Base pair dots -->
  <circle cx="160" cy="120" r="4" fill="#FF6B6B" opacity="0.8"/>
  <circle cx="160" cy="200" r="4" fill="#4ADE80" opacity="0.8"/>
  <circle cx="160" cy="280" r="4" fill="#4EA8DE" opacity="0.8"/>
  <circle cx="160" cy="360" r="4" fill="#FF6B6B" opacity="0.8"/>
</svg>
